<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clovis Graphic Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── CLOVIS DESIGN TOKENS (from Figma) ── */
      :root {
        --bg1: #021f28;
        --surface1: #052c36;
        --surface2: #063e4c;
        --primary: #2fd9ff;
        --primary-bg: rgba(47, 217, 255, 0.12);
        --primary-20: rgba(47, 217, 255, 0.2);
        --border-def: rgba(47, 217, 255, 0.3);
        --border-lt: rgba(47, 217, 255, 0.16);
        --text-pri: #f2f7f9;
        --text-sec: #9ee1f3;
        --text-dis: #c4d0d6;
        --text-hl: #8feaff;
        /* Content highlight blues from token files */
        --content-blue: #2fd9ff;
        --content-blue-strong: #1bd0f8;
        --content-blue-deep: #34a8c2;
        --grad-label: linear-gradient(
          175.87deg,
          #56e6ff 10%,
          #3deed0 60%,
          #00c39b 100%
        );
        --grad-h2: linear-gradient(
          163deg,
          #56e6ff 10%,
          #3deed0 60%,
          #00c39b 100%
        );
        --font-h: "Host Grotesk", sans-serif;
        --font-m: "Geist Mono", monospace;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a1015;
        font-family: var(--font-h);
        color: var(--text-pri);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── TOOLBAR ── */
      .tool-bar {
        background: #0d1820;
        border-bottom: 1px solid rgba(47, 217, 255, 0.15);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .tool-logo {
        font-family: var(--font-m);
        font-size: 13px;
        font-weight: 600;
        color: var(--primary);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .tool-sep {
        width: 1px;
        height: 26px;
        background: rgba(255, 255, 255, 0.1);
        flex-shrink: 0;
      }
      .tool-label {
        font-size: 10px;
        font-family: var(--font-m);
        color: var(--text-dis);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .tool-select {
        background: rgba(47, 217, 255, 0.07);
        border: 1px solid rgba(47, 217, 255, 0.2);
        border-radius: 8px;
        color: var(--text-pri);
        font-family: var(--font-h);
        font-size: 13px;
        padding: 5px 10px;
        outline: none;
        cursor: pointer;
      }
      .tool-select option {
        background: #0d1820;
      }
      .btn {
        padding: 6px 14px;
        border-radius: 8px;
        font-family: var(--font-h);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-bg-sel {
        padding: 5px 10px;
        border-radius: 7px;
        font-family: var(--font-h);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid rgba(47, 217, 255, 0.15);
        background: rgba(47, 217, 255, 0.05);
        color: var(--text-sec);
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-bg-sel:hover {
        border-color: rgba(47, 217, 255, 0.35);
        color: var(--text-pri);
      }
      .btn-bg-sel.active {
        border-color: rgba(47, 217, 255, 0.6);
        background: rgba(47, 217, 255, 0.12);
        color: var(--primary);
      }
      .btn-primary {
        background: var(--primary);
        color: #021f28;
      }
      .btn-primary:hover {
        background: #56e6ff;
      }
      .btn-ghost {
        background: rgba(47, 217, 255, 0.08);
        border: 1px solid rgba(47, 217, 255, 0.25);
        color: var(--primary);
      }
      .btn-ghost:hover {
        background: rgba(47, 217, 255, 0.15);
      }
      .btn-icon {
        padding: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn-icon svg {
        display: block;
      }

      /* ── MAIN LAYOUT ── */
      .main {
        display: flex;
        flex: 1;
      }

      /* ── EDITOR ── */
      .editor-panel {
        width: 330px;
        min-width: 330px;
        background: #0d1820;
        border-right: 1px solid rgba(47, 217, 255, 0.12);
        padding: 18px;
        overflow-y: auto;
        max-height: calc(100vh - 53px);
        transition:
          width 0.2s,
          min-width 0.2s,
          padding 0.2s,
          border 0.2s;
      }
      .editor-panel.collapsed {
        width: 0;
        min-width: 0;
        padding: 0;
        overflow: hidden;
        border-right: none;
      }
      .panel-section {
        margin-bottom: 22px;
      }
      .panel-title {
        font-family: var(--font-m);
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(47, 217, 255, 0.6);
        margin-bottom: 10px;
        padding-bottom: 7px;
        border-bottom: 1px solid rgba(47, 217, 255, 0.1);
      }
      .field-group {
        margin-bottom: 8px;
      }
      .field-label {
        font-size: 10px;
        color: var(--text-dis);
        margin-bottom: 3px;
        font-family: var(--font-m);
        letter-spacing: 0.04em;
      }
      .field-input {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: var(--text-pri);
        font-family: var(--font-h);
        font-size: 13px;
        padding: 6px 9px;
        outline: none;
        transition: border-color 0.15s;
        resize: none;
      }
      .field-input:focus {
        border-color: rgba(47, 217, 255, 0.4);
      }
      .field-select {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        color: var(--text-pri);
        font-family: var(--font-h);
        font-size: 13px;
        padding: 6px 9px;
        outline: none;
        cursor: pointer;
      }
      .field-select option {
        background: #0d1820;
      }
      .row-editor {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 9px;
        padding: 10px;
        margin-bottom: 7px;
      }
      .row-editor-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .row-num {
        font-family: var(--font-m);
        font-size: 10px;
        color: var(--primary);
        opacity: 0.7;
        font-weight: 600;
        letter-spacing: 0.08em;
      }
      .btn-del {
        background: none;
        border: none;
        color: rgba(255, 100, 100, 0.5);
        cursor: pointer;
        font-size: 13px;
        padding: 2px 5px;
        border-radius: 4px;
        line-height: 1;
        transition: color 0.15s;
      }
      .btn-del:hover {
        color: rgba(255, 100, 100, 0.9);
      }
      .row-grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .btn-add-row {
        width: 100%;
        background: rgba(47, 217, 255, 0.05);
        border: 1px dashed rgba(47, 217, 255, 0.22);
        border-radius: 8px;
        color: rgba(47, 217, 255, 0.55);
        font-family: var(--font-h);
        font-size: 12px;
        padding: 7px;
        cursor: pointer;
        transition: all 0.15s;
        margin-top: 4px;
      }
      .btn-add-row:hover {
        background: rgba(47, 217, 255, 0.1);
        color: var(--primary);
      }

      /* ── PREVIEW ── */
      .preview-panel {
        flex: 1;
        background: #111a20;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px;
        overflow: auto;
      }
      .preview-label {
        font-family: var(--font-m);
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.18);
        margin-bottom: 18px;
        align-self: flex-start;
      }
      .scale-wrap {
        width: 100%;
        overflow: hidden;
      }

      /* ══════════════════════════════════════════
   CLOVIS SLIDE (the actual exportable frame)
══════════════════════════════════════════ */
      #slide-output {
        width: 1296px;
        transform-origin: top center;
        background: var(--bg1);
        padding: 80px 80px 72px;
        position: relative;
        overflow: hidden;
      }

      /* Background variant: Figma glow */
      #slide-output.bg-figma {
        background:
          radial-gradient(
            80% 70% at 50% 50%,
            rgba(0, 105, 138, 0.08) 87.15%,
            rgba(0, 142, 186, 0.4) 92.93%,
            rgba(120, 218, 255, 0.43) 96.38%,
            rgba(151, 251, 223, 0.54) 100%
          ),
          #0c0e0e;
      }
      #slide-output.bg-figma::before {
        display: none;
      }
      #slide-output.bg-figma .slide-bg-logo {
        display: block;
      }

      /* Background variant: blue gradient */
      #slide-output.bg-grad {
        background:
          linear-gradient(180deg, rgba(14, 127, 156, 0) 0%, #0e7f9c 100%),
          var(--bg1);
      }
      #slide-output.bg-grad::before {
        display: none;
      }

      /* Default solid */
      #slide-output.bg-solid::before {
        content: "";
        position: absolute;
        top: -120px;
        right: -80px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          ellipse,
          rgba(47, 217, 255, 0.04) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      /* ── Spread Chart Template ─────────────────────────── */
      .spread-chart {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .spread-axis-row {
        display: grid;
        grid-template-columns: 240px 1fr 52px;
        gap: 0 24px;
        align-items: center;
        padding: 0 0 18px 0;
        border-bottom: 1px solid rgba(47, 217, 255, 0.08);
        margin-bottom: 4px;
      }
      .spread-axis-labels {
        display: flex;
        justify-content: space-between;
        padding: 0 2px;
      }
      .spread-axis-lbl {
        font-family: var(--font-m);
        font-size: 14px;
        color: rgba(158, 225, 243, 0.5);
        letter-spacing: 0.06em;
      }

      .spread-row {
        display: grid;
        grid-template-columns: 240px 1fr 52px;
        gap: 0 24px;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid rgba(47, 217, 255, 0.06);
        position: relative;
      }
      .spread-row:last-child {
        border-bottom: none;
      }

      .spread-label {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .spread-meta-icon-stack {
        position: relative;
        width: 54px;
        height: 54px;
        flex-shrink: 0;
      }
      .spread-token-disc {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: radial-gradient(
          circle at 28% 28%,
          #3d86d8 0%,
          #2c73c8 58%,
          #1f5fb0 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-size: 42px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      }
      .spread-token-disc img {
        width: 100%;
      }
      .spread-chain-disc {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #052b3a;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f3f7ff;
        font-size: 16px;
        border: 3px solid #052b3a;
      }
      .spread-chain-discs {
        position: absolute;
        right: -4px;
        bottom: -2px;
        display: inline-flex;
        align-items: center;
      }
      .spread-chain-disc:nth-child(2) {
        margin-left: -8px;
      }
      .spread-chain-disc img {
        width: 100%;
      }
      .spread-meta-text {
        min-width: 0;
      }
      .spread-asset-name {
        font-family: var(--font-h);
        font-size: 24px;
        font-weight: 700;
        line-height: 1.05;
        color: rgba(239, 246, 252, 0.96);
        letter-spacing: -0.01em;
      }
      .spread-chain-name {
        font-family: var(--font-h);
        margin-top: 4px;
        font-size: 17px;
        color: rgba(165, 177, 185, 0.85);
      }

      .spread-bar-area {
        position: relative;
        min-height: 74px;
        display: flex;
        align-items: center;
      }
      /* grid lines */
      .spread-grid-lines {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
      }
      .spread-grid-line {
        width: 1px;
        height: 100%;
        background: rgba(47, 217, 255, 0.06);
      }

      .spread-bars {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .spread-bar-line {
        display: grid;
        grid-template-columns: 120px 1fr;
        align-items: center;
        gap: 8px;
      }
      .spread-proto-lbl {
        font-family: var(--font-m);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .spread-proto-lbl.low {
        color: rgba(165, 177, 185, 0.72);
      }
      .spread-proto-lbl.high {
        color: rgba(47, 217, 255, 0.9);
      }
      .spread-track {
        position: relative;
        height: 12px;
        border-radius: 6px;
        background: rgba(47, 217, 255, 0.06);
        overflow: hidden;
      }
      .spread-track-wrap {
        position: relative;
        padding-top: 18px;
      }
      .spread-fill {
        height: 100%;
        border-radius: 6px;
        min-width: 6px;
        transition: width 0.3s;
      }
      .spread-fill.low {
        background: #4b6570;
      }
      .spread-fill.high {
        background: linear-gradient(
          90deg,
          var(--content-blue-deep) 0%,
          var(--content-blue) 100%
        );
      }
      .spread-rate-top {
        position: absolute;
        top: 0;
        font-family: var(--font-m);
        font-size: 12px;
        white-space: nowrap;
        transform: translateX(-50%);
      }
      .spread-rate-top.low {
        color: rgba(165, 177, 185, 0.8);
      }
      .spread-rate-top.high {
        color: var(--content-blue);
        font-weight: 600;
      }

      .spread-diff-col {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .spread-diff-val {
        font-family: var(--font-m);
        font-size: 18px;
        font-weight: 700;
        color: var(--content-blue);
        letter-spacing: -0.01em;
      }
      .spread-diff-val.high {
        color: var(--content-blue-strong);
        font-size: 22px;
      }
      .spread-diff-lbl {
        font-family: var(--font-m);
        font-size: 12px;
        color: rgba(158, 225, 243, 0.5);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* Slide content wrapper */
      .slide-container {
        display: flex;
        flex-direction: column;
        gap: 48px;
        align-items: center;
        width: 100%;
        position: relative;
        z-index: 1;
      }

      /* Figma bg logo watermark */
      .slide-bg-logo {
        display: none;
        position: absolute;
        top: 28px;
        right: 40px;
        width: 72px;
        height: 72px;
        opacity: 1;
        z-index: 10;
        pointer-events: none;
      }

      /* Heading */
      .slide-heading {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        text-align: center;
        width: 100%;
      }
      .slide-eyebrow {
        font-family: var(--font-h);
        font-size: 20px;
        letter-spacing: 3.6px;
        font-weight: 400;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.5) 0%,
            rgba(255, 255, 255, 0) 100%
          ),
          var(--grad-label);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .slide-h2 {
        font-family: var(--font-h);
        font-size: 54px;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: 0.48px;
        color: var(--text-pri);
        width: 100%;
      }
      .slide-h2 .grad {
        background: var(--grad-h2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .slide-h2.split-two-line {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
      }
      .slide-h2.split-two-line .h2-main,
      .slide-h2.split-two-line .grad {
        display: block;
        white-space: normal;
      }

      /* ── COMPARISON TABLE ── */
      .comp-table {
        display: flex;
        flex-direction: column;
        width: 100%;
      }
      .comp-row-hd {
        display: flex;
        gap: 16px;
        align-items: center;
        width: 100%;
      }
      .col-spacer {
        width: 360px;
        min-width: 360px;
      }
      .col-them-hd {
        width: 360px;
        min-width: 360px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .them-lbl {
        font-family: var(--font-h);
        font-size: 20px;
        color: #9ee1f3;
        font-weight: 400;
        line-height: 1.4;
      }
      .col-clovis-hd {
        flex: 1;
        background: var(--surface1);
        border-radius: 24px 24px 0 0;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .clovis-logo-txt {
        font-family: var(--font-m);
        font-size: 26px;
        font-weight: 600;
        color: var(--text-pri);
        letter-spacing: 0.15em;
      }
      .clovis-tags {
        display: flex;
        gap: 8px;
      }
      .clovis-tag {
        background: var(--primary-bg);
        border-radius: 6px;
        padding: 7px 14px;
        font-family: var(--font-m);
        font-size: 14px;
        font-weight: 500;
        color: var(--primary);
      }
      .comp-row {
        display: flex;
        gap: 16px;
        align-items: center;
        border-bottom: 1px solid var(--border-def);
        min-height: 96px;
        width: 100%;
      }
      .comp-row:last-child {
        border-bottom: none;
      }
      .col-lbl {
        width: 360px;
        min-width: 360px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 24px;
      }
      .row-icon-box {
        background: var(--primary-20);
        width: 44px;
        height: 44px;
        border-radius: 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
      }
      .row-title {
        font-family: var(--font-h);
        font-size: 21px;
        font-weight: 700;
        color: var(--text-pri);
        line-height: 1.4;
      }
      .col-them {
        width: 360px;
        min-width: 360px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .them-main {
        font-size: 18px;
        color: var(--text-sec);
        line-height: 1.6;
        letter-spacing: 0.16px;
      }
      .them-sub {
        font-size: 16px;
        color: #9ee1f3;
        line-height: 1.5;
        letter-spacing: 0.14px;
      }
      .col-clovis {
        flex: 1;
        background: var(--surface1);
        min-height: 96px;
        display: flex;
        align-items: stretch;
        padding: 0 24px;
      }
      .comp-row:last-child .col-clovis {
        border-radius: 0 0 24px 24px;
        padding-bottom: 24px;
      }
      .clovis-cell {
        background: var(--surface2);
        border-left: 1px solid var(--border-lt);
        border-right: 1px solid var(--border-lt);
        border-top: 1px solid var(--border-lt);
        flex: 1;
        display: flex;
        align-items: center;
        padding: 24px;
        gap: 6px;
        border-radius: 16px 16px 0 0;
      }
      .comp-row:last-child .clovis-cell {
        border-bottom: 1px solid var(--border-lt);
        border-radius: 0 0 16px 16px;
      }
      .star-ic {
        color: var(--primary);
        font-size: 15px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .clovis-txt {
        font-family: var(--font-h);
        font-size: 18px;
        font-weight: 700;
        color: var(--text-hl);
        line-height: 1.6;
        letter-spacing: 0.16px;
      }

      /* ── RATE TABLE ── */
      .rate-wrap {
        width: 100%;
      }
      .rate-col-headers {
        display: grid;
        grid-template-columns: 160px 200px 1fr 1fr 128px;
        padding: 0 4px;
        border-bottom: 1px solid rgba(47, 217, 255, 0.14);
        margin-bottom: 2px;
      }
      .rch {
        font-family: var(--font-m);
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(158, 225, 243, 0.8);
        padding: 10px 8px;
      }
      .rch.right {
        text-align: right;
      }
      .rate-row {
        display: grid;
        grid-template-columns: 160px 200px 1fr 1fr 128px;
        align-items: center;
        border-bottom: 1px solid rgba(47, 217, 255, 0.07);
        min-height: 76px;
        padding: 0 4px;
        border-radius: 5px;
      }
      .rate-row:last-child {
        border-bottom: none;
      }
      .rcell {
        padding: 13px 8px;
      }

      /* Token pill */
      .token-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--primary-bg);
        border: 1px solid rgba(47, 217, 255, 0.18);
        border-radius: 8px;
        padding: 5px 11px;
        font-family: var(--font-m);
        font-size: 14px;
        font-weight: 600;
        color: #4dd9d2;
        letter-spacing: 0.04em;
      }
      .token-icon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        flex-shrink: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .token-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* SVG fallback tokens */
      .ti-usdt {
        background: #26a17b;
      }
      .ti-usdc {
        background: #2775ca;
      }

      /* Chain badge */
      .chain-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .chain-arrow {
        font-size: 14px;
        color: rgba(158, 225, 243, 0.72);
        margin: 0 -2px;
      }
      .chain-flow-part {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .chain-flow-name {
        font-size: 16px;
        font-weight: 500;
        color: #9ee1f3;
      }
      .chain-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        flex-shrink: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .chain-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .chain-name {
        font-size: 16px;
        font-weight: 500;
        color: #9ee1f3;
      }

      /* Rate cell */
      .rate-cell {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .proto-lbl {
        font-family: var(--font-m);
        font-size: 14px;
        color: rgba(158, 225, 243, 0.85);
        letter-spacing: 0.05em;
      }
      .rate-num {
        font-family: var(--font-m);
        font-size: 22px;
        font-weight: 600;
        line-height: 1;
      }
      .rate-low {
        color: var(--text-dis);
      }
      .rate-high {
        color: var(--content-blue);
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-top: 5px;
      }
      .bar-b {
        height: 2px;
        border-radius: 2px;
        background: rgba(61, 112, 119, 0.38);
      }
      .bar-s {
        height: 2px;
        border-radius: 2px;
        background: linear-gradient(
          90deg,
          var(--content-blue-deep),
          var(--content-blue)
        );
      }

      /* Diff badge */
      .diff-wrap {
        display: flex;
        justify-content: flex-end;
      }
      .diff-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-family: var(--font-m);
        font-size: 17px;
        font-weight: 700;
        border-radius: 8px;
        padding: 8px 15px;
      }
      .diff-high {
        color: var(--content-blue);
        background: rgba(47, 217, 255, 0.1);
        border: 1px solid rgba(47, 217, 255, 0.26);
      }
      .diff-mid {
        color: var(--content-blue-deep);
        background: var(--primary-bg);
        border: 1px solid rgba(47, 217, 255, 0.22);
      }

      /* Slide footer */
      .slide-footer {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 8px;
      }
      .slide-source {
        font-family: var(--font-m);
        font-size: 14px;
        color: rgba(158, 225, 243, 0.75);
        letter-spacing: 0.05em;
        line-height: 1.7;
      }
      .slide-source .hl {
        color: #8feaff;
      }
      .slide-brand {
        font-family: var(--font-m);
        font-size: 15px;
        font-weight: 600;
        color: var(--primary);
        opacity: 0.75;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- TOOLBAR -->
    <div class="tool-bar">
      <button
        class="btn btn-ghost btn-icon"
        id="editor-toggle"
        onclick="toggleEditorPanel()"
        title="收合編輯區"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="18" x="3" y="3" rx="2" />
          <path d="M9 3v18m7-6l-3-3l3-3" />
        </svg>
      </button>
      <div class="tool-sep"></div>
      <div class="tool-logo">Clovis Maker</div>
      <div class="tool-sep"></div>
      <div class="tool-label">Template</div>
      <select class="tool-select" id="tpl-sel" onchange="switchTpl()">
        <!-- <option value="comparison">Comparison Table</option> -->
        <option value="rate" selected>Rate Data Table</option>
        <option value="spread">Spread Chart</option>
      </select>
      <div class="tool-sep"></div>
      <div class="tool-label">Background</div>
      <div style="display: flex; gap: 5px; align-items: center">
        <button
          class="btn-bg-sel active"
          id="bg-solid"
          onclick="setBg('solid')"
          title="Solid dark"
        >
          ⬛ Solid
        </button>
        <button
          class="btn-bg-sel"
          id="bg-figma"
          onclick="setBg('figma')"
          title="Figma style — glow + logo"
        >
          ✦ Glow
        </button>
        <button
          class="btn-bg-sel"
          id="bg-grad"
          onclick="setBg('grad')"
          title="Blue gradient"
        >
          ▬ Gradient
        </button>
      </div>
      <div class="tool-sep"></div>
      <div class="tool-label">Scale</div>
      <select class="tool-select" id="scale-sel" onchange="applyScale()">
        <option value="0.5">50%</option>
        <option value="0.6">60%</option>
        <option value="0.75">75%</option>
        <option value="1" selected>100% (export)</option>
      </select>
      <div style="flex: 1"></div>
      <select class="tool-select" id="export-scale-sel" title="匯出解析度倍數">
        <option value="1">1x</option>
        <option value="1.5">1.5x</option>
        <option value="2" selected>2x</option>
        <option value="3">3x</option>
      </select>
      <button class="btn btn-ghost" onclick="exportPNG()">⬇ Export PNG</button>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- EDITOR -->
      <div class="editor-panel" id="editor-panel"></div>

      <!-- PREVIEW -->
      <div class="preview-panel">
        <div class="preview-label">Live Preview — 1296 × auto px</div>
        <div class="scale-wrap" id="scale-wrap">
          <div id="slide-output" class="bg-solid"></div>
        </div>
      </div>
    </div>

      function tokenIcon(symbol) {
        const url = TOKEN_ICONS[symbol.toUpperCase()];
        if (url)
          return `<img src="${url}" alt="${symbol}" onerror="this.style.display='none'">`;
        return symbol[0];
      }

      function chainIcon(chainKey) {
        const k = chainKey.toLowerCase();
        const url = CHAIN_ICONS[k];
        const bg = CHAIN_BG[k] || "#4dd9d2";
        if (url)
          return `<img src="${url}" alt="${chainKey}" onerror="this.style.display='none'">`;
        return `<span style="font-size:10px;font-weight:800;color:${bg}">${chainKey[0].toUpperCase()}</span>`;
      }

      function chainBg(chainKey) {
        const k = chainKey.toLowerCase();
        return CHAIN_BG[k] ? CHAIN_BG[k] + "18" : "rgba(77,217,210,0.12)";
      }
      function chainBorder(chainKey) {
        const k = chainKey.toLowerCase();
        return CHAIN_BG[k] ? CHAIN_BG[k] + "44" : "rgba(77,217,210,0.3)";
      }
      function parseChainFlow(chainText) {
        const text = String(chainText || "").trim();
        return text
          .split(/\s*(?:→|->)\s*/g)
          .map((s) => s.trim())
          .filter(Boolean);
      }
      function resolveChainKey(label, fallback) {
        const key = String(label || "").toLowerCase();
        if (CHAIN_KEY_MAP[key]) return CHAIN_KEY_MAP[key];
        return fallback ? String(fallback).toLowerCase() : key;
      }
      function formatComparisonDualChain(text) {
        const src = String(text || "").trim();
        const parts = parseChainFlow(src);
        if (parts.length >= 2) {
          return `O ${parts[0]} -> O ${parts[1]}`;
        }
        return src;

              <div class="spread-label">
                <div class="spread-meta-icon-stack">
                  <div class="spread-token-disc">${tokenIcon(row.asset)}</div>
                  <div class="spread-chain-discs">
                    <div class="spread-chain-disc">${chainIcon(ck)}</div>
                    ${toKey ? `<div class="spread-chain-disc">${chainIcon(toKey)}</div>` : ""}
                  </div>
                </div>
                <div class="spread-meta-text">
                  <div class="spread-asset-name">${e(row.asset)}</div>
                  <div class="spread-chain-name">${e(row.chain).replace(/->/g, "→")}</div>
                </div>
              </div>

              <div class="spread-bar-area">
                <!-- grid lines at each axis tick -->
                <div class="spread-grid-lines">
                  ${Array.from({ length: 6 }, (_, i) => '<div class="spread-grid-line"></div>').join("")}
                </div>
                <div class="spread-bars">
                  <div class="spread-bar-line">
                    <span class="spread-proto-lbl low">${e(row.lowProto)}</span>
                    <div class="spread-track-wrap">
                      <span class="spread-rate-top low" style="left:${loW}px">${lo.toFixed(2)}%</span>
                      <div class="spread-track"><div class="spread-fill low" style="width:${loW}px"></div></div>
                    </div>
                  </div>
                  <div class="spread-bar-line">
                    <span class="spread-proto-lbl high">${e(row.highProto)}</span>
                    <div class="spread-track-wrap">
                      <span class="spread-rate-top high" style="left:${hiW}px">${hi.toFixed(2)}%</span>
                      <div class="spread-track"><div class="spread-fill high" style="width:${hiW}px"></div></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="spread-diff-col">
                <div class="spread-diff-val ${row.tier === "high" ? "high" : ""}">${row.diff}</div>
                <div class="spread-diff-lbl">spread</div>
              </div>
            </div>`;
            })
            .join("")}
        </div>

        ${
          s.sourceText
            ? `
          <div class="slide-footer">
            <div class="slide-source">${s.sourceText}</div>
            <div class="slide-brand">Clovis</div>
          </div>`
            : ""
        }
      </div>`;
        }

        setTimeout(applyScale, 50);
      }

      /* ════════════════════════════════
   HELPERS
════════════════════════════════ */
      function e(s) {
        return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;");
      }

      function setBg(mode) {
        const slide = document.getElementById("slide-output");
        slide.classList.remove("bg-solid", "bg-figma", "bg-grad");
        slide.classList.add("bg-" + mode);
        document
          .querySelectorAll(".btn-bg-sel")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("bg-" + mode).classList.add("active");
      }

      function applyScale() {
        const scale = parseFloat(document.getElementById("scale-sel").value);
        const slide = document.getElementById("slide-output");
        const wrap = document.getElementById("scale-wrap");
        slide.style.transform = `scale(${scale})`;
        slide.style.transformOrigin = "top left";
        wrap.style.height = slide.offsetHeight * scale + "px";
        wrap.style.width = slide.offsetWidth * scale + "px";
      }

      function switchTpl() {
        currentTpl = document.getElementById("tpl-sel").value;
        renderEditor();
        renderSlide();
      }

      function addCompRow() {
        state.comparison.rows.push({
          icon: "✦",
          label: "New Category",
          themMain: "Competitor limitation",
          themSub: "Sub text",
          clovisText: "Clovis advantage",
        });
        renderEditor();
        renderSlide();
      }
      function delCompRow(i) {
        state.comparison.rows.splice(i, 1);
        renderEditor();
        renderSlide();
      }
      function addRateRow() {
        state.rate.rows.push({
          asset: "USDC",
          chain: "Ethereum",
          chainKey: "eth",
          lowProto: "Protocol A",
          lowRate: "3.00%",
          highProto: "Protocol B",
          highRate: "5.00%",
          diff: "1.67×",
          tier: "mid",
        });
        renderEditor();
        renderSlide();
      }
      function delRateRow(i) {
        state.rate.rows.splice(i, 1);
        renderEditor();
        renderSlide();
      }
      function addSpreadRow() {
        state.spread.rows.push({
          asset: "USDC",
          chain: "Ethereum",
          chainKey: "eth",
          lowProto: "Protocol A",
          lowRate: "3.00",
          highProto: "Protocol B",
          highRate: "5.00",
          diff: "1.67×",
          tier: "mid",
        });
        renderEditor();
        renderSlide();
      }
      function delSpreadRow(i) {
        state.spread.rows.splice(i, 1);
        renderEditor();
        renderSlide();
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      const EDITOR_ICON_EXPANDED =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18m7-6l-3-3l3-3"/></svg>';
      const EDITOR_ICON_COLLAPSED =
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18m5-12l3 3l-3 3"/></svg>';
      function toggleEditorPanel() {
        const panel = document.getElementById("editor-panel");
        const btn = document.getElementById("editor-toggle");
        const collapsed = panel.classList.toggle("collapsed");
        btn.innerHTML = collapsed
          ? EDITOR_ICON_COLLAPSED
          : EDITOR_ICON_EXPANDED;
        btn.title = collapsed ? "展開編輯區" : "收合編輯區";
      }

      async function canvasToPngBlob(canvas) {
        if (canvas.toBlob) {
          return new Promise((resolve, reject) => {
            canvas.toBlob(
              (b) => (b ? resolve(b) : reject(new Error("toBlob failed"))),
              "image/png",
            );
          });
        }
        // Safari fallback for environments where toBlob is missing or unreliable.
        const dataUrl = canvas.toDataURL("image/png");
        const bytes = atob(dataUrl.split(",")[1] || "");
        const arr = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
        return new Blob([arr], { type: "image/png" });
      }

      async function loadHtml2Canvas() {
        if (window.html2canvas) return;
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src =
            "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
          script.async = true;
          script.onload = resolve;
          script.onerror = () =>
            reject(new Error("failed to load html2canvas"));
          document.head.appendChild(script);
        });
      }

      function getTextMetrics(style, text) {
        const fontSize = parseFloat(style.fontSize) || 16;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        if (!ctx) return { ascent: fontSize * 0.8, descent: fontSize * 0.2 };
        const fontStyle =
          style.fontStyle && style.fontStyle !== "normal"
            ? `${style.fontStyle} `
            : "";
        const fontWeight = style.fontWeight || "700";
        const fontFamily = style.fontFamily || "sans-serif";
        ctx.font = `${fontStyle}${fontWeight} ${style.fontSize || "16px"} ${fontFamily}`;
        const metrics = ctx.measureText(text || "M");
        if (metrics && metrics.actualBoundingBoxAscent) {
          return {
            ascent: metrics.actualBoundingBoxAscent,
            descent: metrics.actualBoundingBoxDescent || fontSize * 0.2,
          };
        }
        return { ascent: fontSize * 0.8, descent: fontSize * 0.2 };
      }

      function getCanvasFontFromStyle(style) {
        const fontStyle =
          style.fontStyle && style.fontStyle !== "normal"
            ? `${style.fontStyle} `
            : "";
        const fontWeight = style.fontWeight || "700";
        const fontFamily = style.fontFamily || "sans-serif";
        return `${fontStyle}${fontWeight} ${style.fontSize || "16px"} ${fontFamily}`;
      }

      function measureTextWidth(ctx, text, letterSpacingPx = 0) {
        if (!text) return 0;
        const base = ctx.measureText(text).width;
        const extra = Math.max(0, text.length - 1) * letterSpacingPx;
        return base + extra;
      }

      function wrapTextLines(text, maxWidth, style) {
        const clean = (text || "").replace(/\s+/g, " ").trim();
        if (!clean) return [""];
        if (!maxWidth || maxWidth <= 0) return [clean];

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        if (!ctx) return [clean];

        ctx.font = getCanvasFontFromStyle(style);
        const letterSpacing = parseFloat(style.letterSpacing);
        const letterSpacingPx = Number.isFinite(letterSpacing)
          ? letterSpacing
          : 0;

        const words = clean.split(" ");
        const lines = [];
        let line = words[0] || "";
        for (let i = 1; i < words.length; i++) {
          const candidate = `${line} ${words[i]}`;
          if (measureTextWidth(ctx, candidate, letterSpacingPx) <= maxWidth) {
            line = candidate;
          } else {
            lines.push(line);
            line = words[i];
          }
        }
        lines.push(line);
        return lines;
      }

      function createInlineGradientTextSvg(
        text,
        w,
        h,
        style,
        gradientId,
        verticalNudgePx = 0,
      ) {
        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("xmlns", ns);
        svg.setAttribute("width", String(w));
        svg.setAttribute("height", String(h));
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

        const defs = document.createElementNS(ns, "defs");
        const grad = document.createElementNS(ns, "linearGradient");
        grad.setAttribute("id", gradientId);
        grad.setAttribute("x1", "0%");
        grad.setAttribute("y1", "0%");
        grad.setAttribute("x2", "100%");
        grad.setAttribute("y2", "0%");
        const stops = [
          { offset: "10%", color: "#56e6ff" },
          { offset: "60%", color: "#3deed0" },
          { offset: "100%", color: "#00c39b" },
        ];
        stops.forEach((s) => {
          const stop = document.createElementNS(ns, "stop");
          stop.setAttribute("offset", s.offset);
          stop.setAttribute("stop-color", s.color);
          grad.appendChild(stop);
        });
        defs.appendChild(grad);
        svg.appendChild(defs);

        const tm = getTextMetrics(style, text);
        const fontSize = parseFloat(style.fontSize) || 16;
        const lineHeight = parseFloat(style.lineHeight);
        const lineHeightPx = Number.isFinite(lineHeight)
          ? lineHeight
          : fontSize * 1.2;
        const totalGlyph = tm.ascent + tm.descent;
        const topLeading = Math.max(0, (lineHeightPx - totalGlyph) / 2);
        const lines = wrapTextLines(text, w, style);

        const textEl = document.createElementNS(ns, "text");
        textEl.setAttribute("x", "0");
        textEl.setAttribute("xml:space", "preserve");
        textEl.setAttribute("fill", `url(#${gradientId})`);
        textEl.setAttribute("font-family", style.fontFamily || "sans-serif");
        textEl.setAttribute("font-size", style.fontSize || "16px");
        textEl.setAttribute("font-weight", style.fontWeight || "700");
        if (style.fontStyle) textEl.setAttribute("font-style", style.fontStyle);
        if (style.letterSpacing && style.letterSpacing !== "normal") {
          textEl.setAttribute("letter-spacing", style.letterSpacing);
        }
        const firstY = topLeading + tm.ascent + verticalNudgePx;
        lines.forEach((lineText, idx) => {
          const tspan = document.createElementNS(ns, "tspan");
          tspan.setAttribute("x", "0");
          tspan.setAttribute("y", String(firstY + idx * lineHeightPx));
          tspan.textContent = lineText;
          textEl.appendChild(tspan);
        });
        svg.appendChild(textEl);

        svg.style.width = `${w}px`;
        svg.style.height = `${h}px`;
        svg.style.display = "block";
        return svg;
      }

      function svgElementToDataUrl(svgEl) {
        const raw = new XMLSerializer().serializeToString(svgEl);
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(raw)}`;
      }

      function getGradientTextNudgePx(srcEl, fontSize, templateKey) {
        const nudgeMap = {
          rate: { h2: 0.12, eyebrow: 0.08 },
          // Spread template needs larger downward nudge due to export font baseline shift.
          spread: { h2: 0.21, eyebrow: 0.12 },
          comparison: { h2: 0.1, eyebrow: 0.08 },
        };
        const tpl = nudgeMap[templateKey] || nudgeMap.rate;
        return srcEl.matches(".slide-h2 .grad")
          ? Math.round(fontSize * tpl.h2)
          : Math.round(fontSize * tpl.eyebrow);
      }

      function replaceGradientTextWithInlineSvg(
        sourceSlide,
        exportSlide,
        templateKey = "rate",
      ) {
        const sourceTargets = sourceSlide.querySelectorAll(
          ".slide-eyebrow, .slide-h2 .grad",
        );
        const exportTargets = exportSlide.querySelectorAll(
          ".slide-eyebrow, .slide-h2 .grad",
        );
        const slideRect = sourceSlide.getBoundingClientRect();
        const overlay = document.createElement("div");
        overlay.style.position = "absolute";
        overlay.style.left = "0";
        overlay.style.top = "0";
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.pointerEvents = "none";
        overlay.style.zIndex = "9999";
        exportSlide.style.position = "relative";

        sourceTargets.forEach((srcEl, i) => {
          const dstEl = exportTargets[i];
          if (!dstEl) return;
          const srcRect = srcEl.getBoundingClientRect();
          const w = Math.max(1, Math.ceil(srcRect.width));
          const h = Math.max(1, Math.ceil(srcRect.height));
          const left = Math.round(srcRect.left - slideRect.left);
          const top = Math.round(srcRect.top - slideRect.top);
          const style = getComputedStyle(srcEl);
          const gradientId = `exp-grad-${Date.now()}-${i}`;
          const fontSize = parseFloat(style.fontSize) || 16;
          const verticalNudgePx = getGradientTextNudgePx(
            srcEl,
            fontSize,
            templateKey,
          );
          const svg = createInlineGradientTextSvg(
            dstEl.textContent || "",
            w,
            h,
            style,
            gradientId,
            verticalNudgePx,
          );
          const img = document.createElement("img");
          img.src = svgElementToDataUrl(svg);
          img.width = w;
          img.height = h;

          // Keep original text node for layout metrics, and paint gradient on absolute overlay.
          dstEl.style.background = "none";
          dstEl.style.webkitBackgroundClip = "border-box";
          dstEl.style.backgroundClip = "border-box";
          dstEl.style.webkitTextFillColor = "transparent";
          dstEl.style.color = "transparent";
          img.style.position = "absolute";
          img.style.left = `${left}px`;
          img.style.top = `${top}px`;
          img.style.width = `${w}px`;
          img.style.height = `${h}px`;
          img.style.pointerEvents = "none";
          overlay.appendChild(img);
        });
        exportSlide.appendChild(overlay);
      }

      async function waitForImageAssets(root) {
        const images = Array.from(root.querySelectorAll("img"));
        await Promise.all(
          images.map(
            (img) =>
              new Promise((resolve) => {
                if (img.complete && img.naturalWidth > 0) {
                  resolve();
                  return;
                }
                const done = () => resolve();
                img.addEventListener("load", done, { once: true });
                img.addEventListener("error", done, { once: true });
              }),
          ),
        );
      }

      async function exportViaSvgForeignObject(exportSlide, w, h) {
        const styleText = Array.from(document.querySelectorAll("style"))
          .map((s) => s.textContent || "")
          .join("\n");

        const xhtml = `
            <div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px;height:${h}px;overflow:hidden;">
              <style>${styleText}</style>
              ${exportSlide.outerHTML}
            </div>
          `;

        const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
              <foreignObject x="0" y="0" width="100%" height="100%">${xhtml}</foreignObject>
            </svg>
          `;

        const svgBlob = new Blob([svg], {
          type: "image/svg+xml;charset=utf-8",
        });
        const svgUrl = URL.createObjectURL(svgBlob);
        try {
          const img = new Image();
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
            img.src = svgUrl;
          });

          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          if (!ctx) throw new Error("canvas context unavailable");
          ctx.drawImage(img, 0, 0);
          return await canvasToPngBlob(canvas);
        } finally {
          URL.revokeObjectURL(svgUrl);
        }
      }

      async function exportViaHtml2Canvas(exportSlide, w, h, scale = 2) {
        await loadHtml2Canvas();
        const canvas = await window.html2canvas(exportSlide, {
          backgroundColor: null,
          scale: scale,
          useCORS: true,
          logging: false,
          width: w,
          height: h,
        });
        return canvasToPngBlob(canvas);
      }

      async function exportPNG() {
        const btn = document.querySelector('button[onclick="exportPNG()"]');
        const prevLabel = btn ? btn.textContent : "";
        try {
          if (btn) {
            btn.disabled = true;
            btn.textContent = "Exporting...";
          }

          // Force export at 1x logical size to keep output dimensions stable.
          const scaleSel = document.getElementById("scale-sel");
          if (scaleSel) scaleSel.value = "1";
          applyScale();
          await wait(60);

          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }

          const slide = document.getElementById("slide-output");
          if (!slide) throw new Error("slide-output not found");

          const w = slide.offsetWidth;
          const h = slide.offsetHeight;
          if (!w || !h) throw new Error("invalid slide size");

          const exportSlide = slide.cloneNode(true);
          exportSlide.style.transform = "none";
          exportSlide.style.transformOrigin = "top left";
          exportSlide.style.margin = "0";
          exportSlide.style.width = `${w}px`;
          exportSlide.style.height = `${h}px`;
          replaceGradientTextWithInlineSvg(slide, exportSlide, currentTpl);

          const exportHost = document.createElement("div");
          exportHost.style.position = "fixed";
          exportHost.style.left = "-99999px";
          exportHost.style.top = "0";
          exportHost.style.width = `${w}px`;
          exportHost.style.height = `${h}px`;
          exportHost.style.pointerEvents = "none";
          exportHost.style.opacity = "1";
          exportHost.appendChild(exportSlide);
          document.body.appendChild(exportHost);
          await waitForImageAssets(exportSlide);

          const exportScale = parseFloat(document.getElementById("export-scale-sel")?.value || "2");
          let pngBlob;
          try {
            // Prefer html2canvas first to preserve browser-rendered text effects.
            pngBlob = await exportViaHtml2Canvas(exportSlide, w, h, exportScale);
          } catch (primaryErr) {
            console.warn(
              "Primary PNG export failed, trying SVG fallback:",
              primaryErr,
            );
            pngBlob = await exportViaSvgForeignObject(exportSlide, w, h);
          } finally {
            exportHost.remove();
          }

          const a = document.createElement("a");
          const fileName = `clovis-${currentTpl}-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.png`;
          a.href = URL.createObjectURL(pngBlob);
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
        } catch (err) {
          console.error("Export PNG failed:", err);
          alert(
            `Export PNG failed: ${err && err.message ? err.message : "unknown error"}`,
          );
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = prevLabel || "⬇ Export PNG";
          }
        }
      }

      /* ════════════════════════════════
   INIT
════════════════════════════════ */
      // set dropdown to rate template
      document.getElementById("tpl-sel").value = "rate";
      renderEditor();
      renderSlide();
      window.addEventListener("resize", applyScale);
    </script>
  </body>
</html>
